<!DOCTYPE html>
<html lang="en">
 <head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>SaaS Subscription Hell Simulator</title>
     <link rel="icon" href="./img/favicon.png" />
     <link rel="stylesheet" href="styleII.css" />
   </head>
<body>
    <main class="app">
        <div class="logo-block one grid-div">
          <div class="logo-img"></div>
        </div>
        <div class="dude-block two grid-div">
          <!-- <div class="dude-img"></div> -->
        </div>
        <div class="dude-block three grid-div">
          <div class="dude-img"></div>
        </div>
        <!-- <div class="four grid-div">4</div>
        <div class="five grid-div">5</div> -->
        <section class="saas-panel">
            <div class="promo-bar">
              <span>⚠️</span>
              <strong>LIMITED TIME OFFER:</strong>
              <span>99% OFF</span>
              <span class="em">YOUR FINANCIAL FUTURE!</span>
              <span>⚠️</span>
            </div>
          
            <div class="tool-list" id="menuList"></div>
          
            <div class="learn-more">NEED MORE TOOLS? CALL 1-123-456-WANK</div>
          </section>
          
          <aside class="regret-sidebar">
            <section class="cart-panel">
              <header class="cart-header">
                <span class="cart-icon">🛒</span>
                <span><strong>YOUR CART</strong></span>
              </header>
          
              <div class="cart-body" id="cartItems">
                  <p class="empty-cart">No tools yet. Suspiciously healthy.</p>   
                <!-- <button class="more-tools">+ 7 MORE TOOLS OF REGRET...</button> -->
              </div>
            </section>
          
            <section class="damage-panel">
              <h3>👉 $ MONTHLY RECURRING REVENUE 👈</h3>
          
              <div class="damage-number">
                <span class="total">$0</span><span>/mo</span>
              </div>
          
              <!-- <button class="mrr-button">
                SHOW MRR (MAKE ME CRY) 😭
              </button> -->
          
              <p class="roi-line">
                WE DON'T DO ROI HERE.<span>ONLY REGRET.</span>
              </p>
            </section>
          </aside>
          <!-- <div class="eight grid-div">8</div> -->
    </main>
    <script src="scriptII.js"></script>
</body>
</html>
