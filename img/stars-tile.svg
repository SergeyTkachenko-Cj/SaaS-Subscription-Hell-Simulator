<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="star" filter="url(#glow)">
      <circle cx="0" cy="0" r="3" fill="#fff"/>
      <circle cx="0" cy="0" r="8" fill="url(#core)" opacity="0.9"/>
      <path d="M0-18 L2-2 L18 0 L2 2 L0 18 L-2 2 L-18 0 L-2 -2 Z" fill="#e8b4ff" opacity="0.85"/>
      <path d="M0-10 L1-1 L10 0 L1 1 L0 10 L-1 1 L-10 0 L-1 -1 Z" fill="#fff" opacity="0.7"/>
    </g>
    <radialGradient id="core">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="55%" stop-color="#d98cff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <use href="#star" x="80"  y="60"  transform="scale(1.2)"/>
  <use href="#star" x="280" y="140" transform="scale(0.7)"/>
  <use href="#star" x="160" y="320" transform="scale(1)"/>
  <use href="#star" x="340" y="280" transform="scale(0.5)"/>
</svg>