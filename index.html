<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Subscription Hell Simulator</title>
  <link rel="icon" href="./img/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Founder Finance Tool</p>
      <h1>SaaS Subscription Hell Simulator</h1>
      <p class="subtitle">
        Buy tools you absolutely need to avoid doing the actual work.
      </p>
    </section>

    <section class="dashboard">
      <div class="panel">
        <div class="panel-header">
          <h2>SaaS Menu</h2>
          <span>Absolute essentials</span>
        </div>

        <div class="scroll-window menu-window" id="menuList">
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Cart</h2>
          <span>Your monthly regret</span>
        </div>

        <div class="scroll-window cart-window" id="cartList">
          <p class="empty-cart">No tools yet. Suspiciously healthy.</p>
        </div>

        <div class="total-box">
          <span>Total expenses / month</span>
          <strong id="totalExpenses">$0</strong>
        </div>

        <button class="mrr-btn mute-btn" id="mrrBtn" disabled>Show MRR</button>
      </div>
    </section>
  </main>

  <section class="show-popup">
    <!-- <div class="pop-up">
      <div class="panel algn">
        <h2>Congratulations,</h2> 
        <h2 class="second-header">your MRR is now negative 👏</h2>
      </div>
    </div> -->
  </section>

  <script src="script.js"></script>
</body>
</html>
